aid: amazon-clean-rooms
name: Amazon Clean Rooms
description: >-
  Amazon Clean Rooms enables organizations to collaborate and analyze shared datasets without exposing underlying raw data to partners. Create secure data clean rooms in minutes and collaborate with any
  company while maintaining data privacy through differential privacy, cryptographic computing, and flexible analytics.
